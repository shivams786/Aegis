openapi: 3.1.0
info:
  title: Aegis Security Control Plane API
  version: 0.1.0
  summary: Gateway, control-plane, and audit APIs for secure AI-agent tool invocation.
servers:
  - url: http://localhost:8080
paths:
  /live:
    get:
      summary: Process liveness.
      responses:
        "200":
          description: Process is running.
  /ready:
    get:
      summary: Dependency-aware readiness.
      responses:
        "200":
          description: Required dependencies are available.
        "503":
          description: A required dependency is unavailable.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
  /metrics:
    get:
      summary: Prometheus metrics.
      responses:
        "200":
          description: Prometheus text exposition.
  /v1/invocations:
    post:
      summary: Submit a normalized tool invocation.
      parameters:
        - name: Idempotency-Key
          in: header
          required: true
          schema:
            type: string
            minLength: 8
            maxLength: 200
      responses:
        "202":
          description: Invocation accepted or pending approval.
        "403":
          description: Invocation denied.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "501":
          description: Reserved in Milestone 0 implementation.
  /v1/whoami:
    get:
      summary: Return the authenticated Aegis acting identity.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Acting identity extracted from the validated JWT.
        "401":
          description: Missing or invalid bearer token.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
  /v1/invocations/{invocation_id}:
    get:
      summary: Read invocation status without exposing cross-tenant existence.
      parameters:
        - name: invocation_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Invocation status.
        "404":
          description: Generic not found.
        "501":
          description: Reserved in Milestone 0 implementation.
  /v1/invocations/{invocation_id}/reconcile:
    post:
      summary: Reconcile an invocation with an unknown downstream outcome.
      parameters:
        - name: invocation_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Reconciliation result.
  /v1/approvals:
    get:
      summary: List pending approval requests.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Approval inbox.
  /v1/approvals/{approval_request_id}/approve:
    post:
      summary: Approve a pending invocation.
      parameters:
        - name: approval_request_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Approval accepted or invocation executed after final approval.
        "403":
          description: Approval rejected by separation-of-duties or group rules.
  /v1/approvals/{approval_request_id}/reject:
    post:
      summary: Reject a pending invocation.
      parameters:
        - name: approval_request_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Invocation rejected.
  /v1/policy/bundles:
    get:
      summary: List policy bundles for a tenant.
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
        - name: tenant_id
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Policy bundle list.
        "503":
          description: PostgreSQL is unavailable.
    post:
      summary: Register policy bundle metadata.
      parameters:
        - name: tenant_id
          in: query
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PolicyBundleCreate"
      responses:
        "201":
          description: Policy bundle registered.
        "400":
          description: Invalid policy bundle request.
        "503":
          description: PostgreSQL is unavailable.
  /v1/policy/bundles/{bundle_id}:
    get:
      summary: Read policy bundle metadata.
      parameters:
        - name: bundle_id
          in: path
          required: true
          schema:
            type: string
        - name: tenant_id
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Policy bundle metadata.
        "404":
          description: Policy bundle was not found.
  /v1/policy/bundles/{bundle_id}/activate:
    post:
      summary: Activate a policy bundle and retire the previous active bundle.
      parameters:
        - name: bundle_id
          in: path
          required: true
          schema:
            type: string
        - name: tenant_id
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Policy bundle activated.
        "400":
          description: Policy bundle could not be activated.
        "503":
          description: PostgreSQL is unavailable.
  /v1/policy/simulations:
    get:
      summary: List policy simulation replay runs.
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
        - name: tenant_id
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Policy simulation run list.
        "503":
          description: PostgreSQL is unavailable.
    post:
      summary: Queue a policy simulation replay run.
      parameters:
        - name: tenant_id
          in: query
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PolicySimulationCreate"
      responses:
        "201":
          description: Policy simulation run queued.
        "400":
          description: Invalid policy simulation request.
        "503":
          description: PostgreSQL is unavailable.
  /v1/policy/simulations/{simulation_id}:
    get:
      summary: Read a policy simulation replay run.
      parameters:
        - name: simulation_id
          in: path
          required: true
          schema:
            type: string
        - name: tenant_id
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Policy simulation run.
        "404":
          description: Simulation was not found.
  /v1/tools:
    get:
      summary: List active tools available to the caller.
      responses:
        "200":
          description: Tool list filtered by tenant and scopes.
  /v1/audit/events:
    get:
      summary: List tenant audit events.
      responses:
        "200":
          description: Audit event list.
  /v1/audit/verify:
    post:
      summary: Verify tenant audit chain.
      responses:
        "200":
          description: Audit chain verifies.
        "409":
          description: Audit chain verification failed.
  /v1/audit/roots:
    get:
      summary: Generate or read tenant audit root manifests.
      responses:
        "200":
          description: Audit root manifest.
  /mcp:
    post:
      summary: Streamable HTTP MCP endpoint.
      responses:
        "200":
          description: JSON-RPC MCP response.
  /.well-known/oauth-protected-resource:
    get:
      summary: OAuth protected-resource metadata for MCP HTTP deployment.
      responses:
        "200":
          description: Protected resource metadata.
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    Problem:
      type: object
      required:
        - type
        - title
        - status
        - detail
        - reason_code
      properties:
        type:
          type: string
          format: uri
        title:
          type: string
        status:
          type: integer
        detail:
          type: string
        reason_code:
          type: string
    PolicyBundleCreate:
      type: object
      required:
        - version
        - policy_hash
      properties:
        id:
          type: string
        version:
          type: string
        policy_hash:
          type: string
          pattern: "^sha256:"
        source:
          type: string
          enum:
            - local
            - opa_bundle
            - uploaded
            - candidate
          default: candidate
        description:
          type: string
        opa_bundle_url:
          type: string
        metadata:
          type: object
          additionalProperties: true
        created_by_subject_id:
          type: string
    PolicyBundle:
      allOf:
        - $ref: "#/components/schemas/PolicyBundleCreate"
        - type: object
          required:
            - tenant_id
            - id
            - source
            - status
            - active
            - description
            - metadata
            - created_at
            - updated_at
          properties:
            tenant_id:
              type: string
            status:
              type: string
              enum:
                - CANDIDATE
                - ACTIVE
                - RETIRED
                - REJECTED
            active:
              type: boolean
            created_at:
              type: string
              format: date-time
            updated_at:
              type: string
              format: date-time
            activated_at:
              type: string
              format: date-time
            retired_at:
              type: string
              format: date-time
    PolicySimulationCreate:
      type: object
      required:
        - baseline_policy_version
        - baseline_policy_hash
        - proposed_policy_version
        - proposed_policy_hash
      properties:
        id:
          type: string
        requested_by_subject_id:
          type: string
        baseline_policy_version:
          type: string
        baseline_policy_hash:
          type: string
          pattern: "^sha256:"
        proposed_policy_version:
          type: string
        proposed_policy_hash:
          type: string
          pattern: "^sha256:"
        sample_scope:
          type: object
          additionalProperties: true
