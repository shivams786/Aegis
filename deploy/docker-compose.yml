services:
  postgres:
    image: ${POSTGRES_IMAGE:-postgres:16.4}
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-aegis}
      POSTGRES_USER: ${POSTGRES_USER:-aegis}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-aegis_dev_password}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ../migrations:/migrations:ro
      - ../scripts:/seed:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: ${REDIS_IMAGE:-redis:7.4-alpine}
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data

  nats:
    image: ${NATS_IMAGE:-nats:2.10-alpine}
    command: ["-js", "-sd", "/data"]
    ports:
      - "${NATS_CLIENT_PORT:-4222}:4222"
      - "${NATS_MONITOR_PORT:-8222}:8222"
    volumes:
      - nats-data:/data

  opa:
    image: ${OPA_IMAGE:-openpolicyagent/opa:0.70.0}
    command: ["run", "--server", "--addr", "0.0.0.0:8181", "--config-file", "/config/config.yaml", "/policies"]
    ports:
      - "${OPA_PORT:-8181}:8181"
    volumes:
      - ./opa/config.yaml:/config/config.yaml:ro
      - ../policies:/policies:ro

  keycloak:
    image: ${KEYCLOAK_IMAGE:-quay.io/keycloak/keycloak:26.0}
    command: ["start-dev", "--import-realm"]
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
    ports:
      - "${KEYCLOAK_PORT:-8081}:8080"
    volumes:
      - ./keycloak/realm-export.json:/opt/keycloak/data/import/aegis-realm.json:ro

  openbao:
    image: ${OPENBAO_IMAGE:-openbao/openbao:2.0.0}
    cap_add:
      - IPC_LOCK
    environment:
      BAO_DEV_ROOT_TOKEN_ID: ${OPENBAO_DEV_TOKEN:-dev-root-token}
      BAO_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
    command: ["server", "-dev"]
    ports:
      - "${OPENBAO_PORT:-8200}:8200"

  otel-collector:
    image: ${OTEL_COLLECTOR_IMAGE:-otel/opentelemetry-collector-contrib:0.116.1}
    command: ["--config=/etc/otelcol-contrib/config.yaml"]
    ports:
      - "${OTEL_GRPC_PORT:-4317}:4317"
      - "${OTEL_HTTP_PORT:-4318}:4318"
    volumes:
      - ./otel/otel-collector.yaml:/etc/otelcol-contrib/config.yaml:ro

  prometheus:
    image: ${PROMETHEUS_IMAGE:-prom/prometheus:v2.55.1}
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus

  grafana:
    image: ${GRAFANA_IMAGE:-grafana/grafana:11.4.0}
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro

  gateway:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    environment:
      AEGIS_SERVICE_NAME: aegis-gateway
      AEGIS_ENVIRONMENT: development
      AEGIS_HTTP_ADDR: :8080
      AEGIS_DATABASE_URL: postgres://${POSTGRES_USER:-aegis}:${POSTGRES_PASSWORD:-aegis_dev_password}@postgres:5432/${POSTGRES_DB:-aegis}?sslmode=disable
      AEGIS_REQUIRE_DATABASE: "true"
      AEGIS_OTEL_EXPORTER_OTLP_ENDPOINT: otel-collector:4317
      AEGIS_AUTH_ENABLED: ${AEGIS_AUTH_ENABLED:-false}
      AEGIS_AUTH_ISSUER: ${AEGIS_AUTH_ISSUER:-http://localhost:8081/realms/aegis}
      AEGIS_AUTH_AUDIENCE: ${AEGIS_AUTH_AUDIENCE:-aegis-gateway}
      AEGIS_AUTH_JWKS_URL: ${AEGIS_AUTH_JWKS_URL:-http://keycloak:8080/realms/aegis/protocol/openid-connect/certs}
      AEGIS_AUTH_REQUIRED_SCOPES: ${AEGIS_AUTH_REQUIRED_SCOPES:-aegis.invoke}
      AEGIS_AUTH_APPROVED_ALGORITHMS: ${AEGIS_AUTH_APPROVED_ALGORITHMS:-RS256}
      AEGIS_AUTH_REQUIRED_TOKEN_TYPE: ${AEGIS_AUTH_REQUIRED_TOKEN_TYPE:-Bearer}
      AEGIS_AUTH_CLOCK_SKEW: ${AEGIS_AUTH_CLOCK_SKEW:-30s}
      AEGIS_AUTH_PROTECTED_RESOURCE_ID: ${AEGIS_AUTH_PROTECTED_RESOURCE_ID:-http://localhost:8080}
    ports:
      - "${AEGIS_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_started
      otel-collector:
        condition: service_started

volumes:
  postgres-data:
  redis-data:
  nats-data:
  prometheus-data:
  grafana-data:
